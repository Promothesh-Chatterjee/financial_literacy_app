version: '3.8'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finlit_sim
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/finlit_sim
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-local-dev-secret}
      - ALLOW_DEV_INIT=${ALLOW_DEV_INIT:-true}
      - MARKET_WORKER_SECRET=${MARKET_WORKER_SECRET:-test-secret}
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "pnpm dev --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  db_data:
